<section class="social" aria-label="Contact links">
  <span class="contacticon center">
    <a href="mailto:{{ site.email | encode_email }}" title="Email"><i class="fas fa-envelope"></i></a>
    {% if site.orcid_id %}<a href="https://orcid.org/{{ site.orcid_id }}" target="_blank" rel="noopener noreferrer" title="ORCID"><i class="ai ai-orcid"></i></a>{% endif %} {%
    if site.scholar_userid %}<a href="https://scholar.google.com/citations?user={{ site.scholar_userid }}" target="_blank" rel="noopener noreferrer" title="Google Scholar"
      ><i class="ai ai-google-scholar"></i></a
    >{% endif %} {% if site.github_username %}<a href="https://github.com/{{ site.github_username }}" target="_blank" rel="noopener noreferrer" title="GitHub"
      ><i class="fab fa-github"></i></a
    >{% endif %} {% if site.linkedin_username %}<a href="https://www.linkedin.com/in/{{ site.linkedin_username }}" target="_blank" rel="noopener noreferrer" title="LinkedIn"
      ><i class="fab fa-linkedin"></i></a
    >{% endif %} {% if site.twitter_username %}<a href="https://twitter.com/{{ site.twitter_username }}" target="_blank" rel="noopener noreferrer" title="Twitter"
      ><i class="fab fa-twitter"></i></a
    >{% endif %} {% if site.strava_userid %}<a href="https://www.strava.com/athletes/{{ site.strava_userid }}" target="_blank" rel="noopener noreferrer" title="Strava"
      ><i class="fab fa-strava"></i></a
    >{% endif %}
  </span>

  <div class="col three caption">{{ site.contact_note }}</div>
</section>
